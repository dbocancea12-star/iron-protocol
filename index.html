    // ─── RING ───
    function Ring({ value, max, size=80, stroke=6, color="#00e676", label, sublabel }) {
      const r = (size - stroke) / 2, c = 2 * Math.PI * r, pct = Math.min(value / (max || 1), 1);
      return (
        <div style={{ display:"flex", flexDirection:"column", alignItems:"center", gap:4 }}>
          <svg width={size} height={size} style={{ transform:"rotate(-90deg)" }}>
            <circle cx={size/2} cy={size/2} r={r} stroke="#1e1e28" strokeWidth={stroke} fill="none"/>
            <circle cx={size/2} cy={size/2} r={r} stroke={color} strokeWidth={stroke} fill="none" strokeDasharray={c} strokeDashoffset={c*(1-pct)} strokeLinecap="round" className="progress-ring"/>
          </svg>
          <div style={{ textAlign:"center", marginTop:-size-4, height:size, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center" }}>
            <div style={{ fontFamily:"'Space Mono',monospace", fontWeight:700, fontSize:16, color }}>{value}</div>
          </div>
          {label && <div style={{ fontSize:11, fontWeight:700, color:"#888", marginTop:4, letterSpacing:.5 }}>{label}</div>}
          {sublabel && <div style={{ fontSize:10, color:"#555" }}>{sublabel}</div>}
        </div>
      );
    }

    // ─── WORKOUT CHECKLIST ───

      const [open, setOpen] = useState(false);
      const done = dayLog.checkedWorkouts?.[workout.id];
      const keys = workout.exercises.flatMap((eid,ei) => [0,1,2].map(si => `${workout.id}-${eid}-${si}`));
      const completed = keys.filter(k => dayLog.checkedSets?.[k]).length;
      return (
        <div className="card" style={{ borderLeft: done ? "3px solid #00e676" : "3px solid #2a2a38" }}>
          <div style={{ display:"flex", alignItems:"center", gap:10, cursor:"pointer" }} onClick={() => setOpen(!open)}>
            <div className={`check-box ${done?"checked":""}`} onClick={e => { e.stopPropagation(); toggleWorkout(workout.id); }}>

      const [open, setOpen] = useState(false);
      const topExercise = exercises.reduce((best, ex) => ex.topWeight > (best?.topWeight || 0) ? ex : best, exercises[0]);
      const muscleIcons = { "Legs": "🦵", "Chest": "💪", "Back": "🔙", "Shoulders": "🏋️", "Arms": "💪", "Core": "🎯", "Cardio": "❤️", "Full Body": "⚡" };
      return (
        <div className="card" style={{ borderLeft: `3px solid ${color}`, overflow: "hidden" }}>
          <div style={{ display: "flex", alignItems: "center", gap: 10, cursor: "pointer" }} onClick={() => setOpen(!open)}>
            <div style={{ fontSize: 20 }}>{muscleIcons[muscle] || "🏋️"}</div>
            <div style={{ flex: 1 }}>
              <div style={{ fontWeight: 700, fontSize: 14, color }}>{muscle}</div>
              <div style={{ fontSize: 11, color: "#666" }}>{exercises.length} exercises · Top: {topExercise.name}</div>
            </div>
            <div style={{ textAlign: "right", marginRight: 6 }}>
              <div style={{ fontFamily: "'Space Mono',monospace", fontWeight: 700, fontSize: 14, color }}>{topExercise.topWeight}kg</div>
              <div style={{ fontSize: 10, color: "#555" }}>× {topExercise.topReps}</div>
            </div>
            <div style={{ color: "#555" }}>{open ? I.chevUp : I.chevDown}</div>
          </div>
          {open && (
            <div style={{ marginTop: 12, borderTop: "1px solid #1e1e28", paddingTop: 8 }}>
              {exercises.sort((a, b) => b.topWeight - a.topWeight).map((ex, i) => (
                <div key={ex.id} style={{ display: "flex", alignItems: "center", padding: "7px 0", borderBottom: i < exercises.length - 1 ? "1px solid #1a1a24" : "none", gap: 8 }}>
                  <div style={{ width: 22, height: 22, borderRadius: 6, background: i === 0 ? color : "transparent", border: i === 0 ? "none" : "1px solid #2a2a38", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 10, fontWeight: 700, color: i === 0 ? "#000" : "#555", fontFamily: "'Space Mono',monospace", flexShrink: 0 }}>
                    {i === 0 ? "👑" : i + 1}
                  </div>
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div style={{ fontSize: 12, fontWeight: 600, color: i === 0 ? color : "#ccc", whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{ex.name}</div>
                  </div>
                  <div style={{ fontFamily: "'Space Mono',monospace", fontWeight: 700, fontSize: 13, color: i === 0 ? color : "#888", whiteSpace: "nowrap" }}>{ex.topWeight}kg × {ex.topReps}</div>
                </div>
              ))}
            </div>
          )}
        </div>
      );
    }

    // ─── MAIN APP ───
    function App() {
      const [state, setState] = useState(() => loadState() || INITIAL_STATE);
      const [tab, setTab] = useState("today");
      const [modal, setModal] = useState(null);
      const [selectedDate, setSelectedDate] = useState(getToday());

      const update = useCallback(fn => {
        setState(prev => { const next = fn(prev); saveState(next); return next; });
      }, []);

      const getDayLog = useCallback(date => {
        return state.dailyLog[date||selectedDate] || { checkedWorkouts:{}, checkedSets:{}, checkedMeals:{}, checkedFoods:{} };
      }, [state, selectedDate]);

      const updateDayLog = useCallback((date, patch) => {
        update(s => ({ ...s, dailyLog: { ...s.dailyLog, [date]: { ...getDayLog(date), ...patch } } }));
      }, [update, getDayLog]);

      const dayLog = getDayLog(selectedDate);

      const todayCalories = state.meals.reduce((sum, meal) => {
        if (!dayLog.checkedMeals?.[meal.id]) return sum;
        return sum + meal.foods.reduce((fs, fid) => { const f = state.foods.find(x => x.id===fid); return fs + (f?f.calories:0); }, 0);
      }, 0);
      const todayProtein = state.meals.reduce((sum, meal) => {
        if (!dayLog.checkedMeals?.[meal.id]) return sum;
        return sum + meal.foods.reduce((fs, fid) => { const f = state.foods.find(x => x.id===fid); return fs + (f?f.protein:0); }, 0);
      }, 0);
      const totalSets = state.workouts.reduce((s, w) => s + w.exercises.length * 3, 0);
      const checkedSets = Object.values(dayLog.checkedSets || {}).filter(Boolean).length;

      let streak = 0;
      const d = new Date(selectedDate);
      for (let i = 0; i < 365; i++) {
        const ds = new Date(d); ds.setDate(ds.getDate() - i);
        const key = ds.toISOString().split("T")[0];
        const log = state.dailyLog[key];
        if (log && (Object.values(log.checkedWorkouts||{}).some(Boolean) || Object.values(log.checkedMeals||{}).some(Boolean))) streak++;
        else if (i > 0) break;
      }

      const toggleWorkout = wid => updateDayLog(selectedDate, { checkedWorkouts: { ...dayLog.checkedWorkouts, [wid]: !dayLog.checkedWorkouts?.[wid] } });
      const toggleSet = key => updateDayLog(selectedDate, { checkedSets: { ...dayLog.checkedSets, [key]: !dayLog.checkedSets?.[key] } });
      const toggleMeal = mid => updateDayLog(selectedDate, { checkedMeals: { ...dayLog.checkedMeals, [mid]: !dayLog.checkedMeals?.[mid] } });
      const toggleFood = key => updateDayLog(selectedDate, { checkedFoods: { ...dayLog.checkedFoods, [key]: !dayLog.checkedFoods?.[key] } });

      const workoutsDone = Object.values(dayLog.checkedWorkouts||{}).filter(Boolean).length;
      const mealsDone = Object.values(dayLog.checkedMeals||{}).filter(Boolean).length;

      const tabs = [
        { key:"today", label:"Today", icon:I.calendar },
        { key:"workouts", label:"Workouts", icon:I.dumbbell },
        { key:"meals", label:"Meals", icon:I.food },
        { key:"progress", label:"Progress", icon:I.chart },
      ];

      // ─── PROGRESS DATA ───
      const dates = Object.keys(state.dailyLog).sort().slice(-14);
      const calHistory = dates.map(d => {
        const log = state.dailyLog[d];
        return {
          date: d,
          calories: state.meals.reduce((sum, meal) => {
            if (!log?.checkedMeals?.[meal.id]) return sum;
            return sum + meal.foods.reduce((fs, fid) => { const f = state.foods.find(x=>x.id===fid); return fs+(f?f.calories:0); }, 0);
          }, 0),
          sets: Object.values(log?.checkedSets||{}).filter(Boolean).length,
        };
      });

      return (
        <div style={{ minHeight:"100vh", background:"#0a0a0f", color:"#e8e6e3", fontFamily:"'DM Sans',sans-serif", maxWidth:520, margin:"0 auto", position:"relative", paddingBottom:80 }}>

          {/* HEADER */}
          <div style={{ padding:"20px 20px 0", display:"flex", justifyContent:"space-between", alignItems:"center" }}>
            <div>
              <div style={{ fontSize:11, fontWeight:700, letterSpacing:2, color:"#00e676", textTransform:"uppercase", fontFamily:"'Space Mono',monospace" }}>Iron Protocol</div>
              <div style={{ fontSize:22, fontWeight:700, marginTop:2 }}>Fitness Tracker</div>
            </div>
            <div style={{ display:"flex", alignItems:"center", gap:8 }}>
              {streak > 0 && <div className="chip" style={{ background:"rgba(255,152,0,.15)", color:"#ff9800" }}>{I.fire} {streak}d streak</div>}
              <button className="btn" onClick={()=>{ if(confirm("Reset all data?")) update(()=>INITIAL_STATE); }} style={{ background:"#1a1a24", color:"#666", borderRadius:8, padding:"6px 8px", display:"flex" }} title="Reset">{I.reset}</button>
            </div>
          </div>

          {/* DATE */}
          <div style={{ padding:"12px 20px", display:"flex", alignItems:"center", gap:8 }}>
            <input type="date" value={selectedDate} onChange={e=>setSelectedDate(e.target.value)} style={{ background:"#1a1a24", border:"1px solid #2a2a38", color:"#e8e6e3", borderRadius:8, padding:"6px 10px", fontFamily:"'Space Mono',monospace", fontSize:13, flex:1 }}/>
            {selectedDate !== getToday() && <button className="btn" onClick={()=>setSelectedDate(getToday())} style={{ background:"#00e676", color:"#000", borderRadius:8, padding:"6px 12px", fontSize:12, fontWeight:700 }}>Today</button>}
          </div>

          {/* DELOAD TOGGLE */}
          <div style={{ padding:"0 20px 8px" }}>
            <div onClick={()=>{
              const newVal = !state.deloadWeek;
              update(s => ({
                ...s,
                deloadWeek: newVal,
                deloadHistory: newVal
                  ? [...s.deloadHistory, { start: getToday(), end: null }]
                  : s.deloadHistory.map((d, i) => i === s.deloadHistory.length - 1 ? { ...d, end: getToday() } : d)
              }));
            }} style={{ display:"flex", alignItems:"center", gap:10, padding:"10px 14px", borderRadius:10, cursor:"pointer", background: state.deloadWeek ? "rgba(255,152,0,.12)" : "#141419", border: state.deloadWeek ? "1px solid rgba(255,152,0,.4)" : "1px solid #1e1e28", transition:"all .2s ease" }}>
              <div style={{ width:40, height:22, borderRadius:11, background: state.deloadWeek ? "#ff9800" : "#2a2a38", position:"relative", transition:"background .2s ease", flexShrink:0 }}>
                <div style={{ width:18, height:18, borderRadius:9, background: state.deloadWeek ? "#fff" : "#555", position:"absolute", top:2, left: state.deloadWeek ? 20 : 2, transition:"all .2s ease" }}/>
              </div>
              <div style={{ flex:1 }}>
                <div style={{ fontSize:13, fontWeight:700, color: state.deloadWeek ? "#ff9800" : "#888" }}>
                  {state.deloadWeek ? "🔄 DELOAD WEEK ACTIVE" : "Deload Week"}
                </div>
                <div style={{ fontSize:10, color:"#555" }}>
                  {state.deloadWeek ? "Reduce volume 40-50%, keep intensity. Focus on recovery & technique." : "Tap to activate when you need a recovery week"}
                </div>
              </div>
            </div>
            {state.deloadWeek && (
              <div style={{ marginTop:6, padding:"8px 12px", background:"rgba(255,152,0,.08)", borderRadius:8, border:"1px solid rgba(255,152,0,.15)" }}>
                <div style={{ fontSize:11, color:"#ff9800", fontWeight:600, marginBottom:4 }}>📋 Deload Protocol</div>
                <div style={{ fontSize:11, color:"#999", lineHeight:1.6 }}>
                  • Drop to 2 sets per exercise (instead of 3)<br/>
                  • Keep weight the same, reduce reps by 30-40%<br/>
                  • Cut total weekly volume by ~50%<br/>
                  • Maintain protein at {state.proteinTarget}g — recovery demands it<br/>
                  • Eat at maintenance (~{state.calorieTarget} kcal)<br/>
                  • Prioritise sleep (8+ hrs) & hydration
                </div>
              </div>
            )}
          </div>

          {/* CONTENT */}
          <div style={{ padding:"0 20px 20px" }}>

            {/* ── TODAY ── */}
            {tab === "today" && (<>
              <div className="card" style={{ display:"flex", justifyContent:"space-around", padding:20 }}>
                <Ring value={todayCalories} max={state.calorieTarget} color="#00e676" label="CALORIES" sublabel={`/ ${state.calorieTarget}`}/>
                <Ring value={todayProtein} max={state.proteinTarget} color="#448aff" label="PROTEIN" sublabel={`/ ${state.proteinTarget}g`}/>
                <Ring value={checkedSets} max={totalSets} color="#ff9800" label="SETS" sublabel={`/ ${totalSets}`}/>
              </div>
              <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10, marginBottom:12 }}>
                <div className="card" style={{ textAlign:"center", padding:12 }}>
                  <div style={{ fontSize:24, fontWeight:700, fontFamily:"'Space Mono',monospace", color:"#00e676" }}>{workoutsDone}</div>
                  <div style={{ fontSize:11, color:"#666", fontWeight:600 }}>WORKOUTS DONE</div>
                </div>
                <div className="card" style={{ textAlign:"center", padding:12 }}>
                  <div style={{ fontSize:24, fontWeight:700, fontFamily:"'Space Mono',monospace", color:"#448aff" }}>{mealsDone}</div>
                  <div style={{ fontSize:11, color:"#666", fontWeight:600 }}>MEALS LOGGED</div>
                </div>
              </div>
              <div style={{ fontSize:14, fontWeight:700, display:"flex", alignItems:"center", gap:6, marginBottom:8 }}>{I.dumbbell} Workout Checklist</div>
              {state.workouts.map(w => <WorkoutCheck key={w.id} workout={w} state={state} dayLog={dayLog} toggleWorkout={toggleWorkout} toggleSet={toggleSet}/>)}
              <div style={{ fontSize:14, fontWeight:700, display:"flex", alignItems:"center", gap:6, marginTop:16, marginBottom:8 }}>{I.food} Meal Checklist</div>
              {state.meals.map(m => <MealCheck key={m.id} meal={m} state={state} dayLog={dayLog} toggleMeal={toggleMeal} toggleFood={toggleFood}/>)}
            </>)}

            {/* ── WORKOUTS ── */}
            {tab === "workouts" && (<>
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:10 }}>
                <div style={{ fontSize:14, fontWeight:700 }}>Exercise Library</div>
                <button className="btn" onClick={()=>setModal({type:"addEx"})} style={{ background:"#00e676", color:"#000", borderRadius:8, padding:"6px 12px", fontSize:12, fontWeight:700, display:"flex", alignItems:"center", gap:4 }}>{I.plus} Exercise</button>
              </div>
              {state.exercises.map(ex => (
                <div key={ex.id} className="card" style={{ display:"flex", alignItems:"center", gap:10 }}>
                  <div style={{ flex:1 }}>
                    <div style={{ fontWeight:600, fontSize:14 }}>{ex.name}</div>
                    <div style={{ fontSize:11, color:"#666" }}>{ex.muscle}</div>
                  </div>
                  <div style={{ textAlign:"right" }}>
                    <div style={{ fontFamily:"'Space Mono',monospace", fontWeight:700, fontSize:14, color:"#00e676" }}>{ex.topWeight}kg</div>
                    <div style={{ fontSize:11, color:"#666" }}>{ex.topReps} reps</div>
                  </div>
                  <div style={{ display:"flex", flexDirection:"column", gap:4 }}>
                    <div style={{ display:"flex", gap:2 }}>
                      <button className="stepper-btn" onClick={()=>update(s=>({...s,exercises:s.exercises.map(e=>e.id===ex.id?{...e,topWeight:Math.max(0,e.topWeight-2.5)}:e)}))}>{I.arrowDown}</button>
                      <button className="stepper-btn" onClick={()=>update(s=>({...s,exercises:s.exercises.map(e=>e.id===ex.id?{...e,topWeight:e.topWeight+2.5}:e)}))}>{I.arrowUp}</button>
                    </div>
                    <div style={{ display:"flex", gap:2 }}>
                      <button className="stepper-btn" onClick={()=>update(s=>({...s,exercises:s.exercises.map(e=>e.id===ex.id?{...e,topReps:Math.max(1,e.topReps-1)}:e)}))}>{I.arrowDown}</button>
                      <button className="stepper-btn" onClick={()=>update(s=>({...s,exercises:s.exercises.map(e=>e.id===ex.id?{...e,topReps:e.topReps+1}:e)}))}>{I.arrowUp}</button>
                    </div>
                  </div>
                  <div style={{ display:"flex", flexDirection:"column", gap:4 }}>
                    <button className="btn" onClick={()=>setModal({type:"editEx",exercise:ex})} style={{ background:"#1e1e28", color:"#aaa", borderRadius:6, padding:5, display:"flex" }}>{I.edit}</button>
                    <button className="btn" onClick={()=>update(s=>({...s,exercises:s.exercises.filter(e=>e.id!==ex.id)}))} style={{ background:"#1e1e28", color:"#f44", borderRadius:6, padding:5, display:"flex" }}>{I.trash}</button>
                  </div>
                </div>
              ))}

              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginTop:20, marginBottom:10 }}>
                <div style={{ fontSize:14, fontWeight:700 }}>Workout Templates</div>
                <button className="btn" onClick={()=>setModal({type:"addW"})} style={{ background:"#00e676", color:"#000", borderRadius:8, padding:"6px 12px", fontSize:12, fontWeight:700, display:"flex", alignItems:"center", gap:4 }}>{I.plus} Workout</button>
              </div>
              {state.workouts.map(w => (
                <div key={w.id} className="card">
                  <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between" }}>
                    <div>
                      <div style={{ fontWeight:700, fontSize:14 }}>{w.name}</div>
                      <div style={{ fontSize:11, color:"#666", marginTop:2 }}>{w.exercises.map(eid=>state.exercises.find(e=>e.id===eid)?.name).filter(Boolean).join(" · ")}</div>
                    </div>
                    <div style={{ display:"flex", gap:6 }}>
                      <button className="btn" onClick={()=>setModal({type:"editW",workout:w})} style={{ background:"#1e1e28", color:"#aaa", borderRadius:6, padding:6, display:"flex" }}>{I.edit}</button>
                      <button className="btn" onClick={()=>update(s=>({...s,workouts:s.workouts.filter(x=>x.id!==w.id)}))} style={{ background:"#1e1e28", color:"#f44", borderRadius:6, padding:6, display:"flex" }}>{I.trash}</button>
                    </div>
                  </div>
                </div>
              ))}
            </>)}

            {/* ── MEALS ── */}
            {tab === "meals" && (<>
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:10 }}>
                <div style={{ fontSize:14, fontWeight:700 }}>Food Library</div>
                <button className="btn" onClick={()=>setModal({type:"addFood"})} style={{ background:"#448aff", color:"#fff", borderRadius:8, padding:"6px 12px", fontSize:12, fontWeight:700, display:"flex", alignItems:"center", gap:4 }}>{I.plus} Food</button>
              </div>
              {state.foods.map(food => (
                <div key={food.id} className="card" style={{ display:"flex", alignItems:"center", gap:10 }}>
                  <div style={{ flex:1 }}>
                    <div style={{ fontWeight:600, fontSize:13 }}>{food.name}</div>
                    <div style={{ fontSize:10, color:"#666" }}>P:{food.protein}g · C:{food.carbs}g · F:{food.fat}g</div>
                  </div>
                  <div style={{ fontFamily:"'Space Mono',monospace", fontWeight:700, fontSize:13, color:"#448aff" }}>{food.calories}</div>
                  <div style={{ fontSize:10, color:"#555" }}>kcal</div>
                  <div style={{ display:"flex", gap:4 }}>
                    <button className="btn" onClick={()=>setModal({type:"editFood",food})} style={{ background:"#1e1e28", color:"#aaa", borderRadius:6, padding:5, display:"flex" }}>{I.edit}</button>
                    <button className="btn" onClick={()=>update(s=>({...s,foods:s.foods.filter(f=>f.id!==food.id)}))} style={{ background:"#1e1e28", color:"#f44", borderRadius:6, padding:5, display:"flex" }}>{I.trash}</button>
                  </div>
                </div>
              ))}

              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginTop:20, marginBottom:10 }}>
                <div style={{ fontSize:14, fontWeight:700 }}>Meal Templates</div>
                <button className="btn" onClick={()=>setModal({type:"addMeal"})} style={{ background:"#448aff", color:"#fff", borderRadius:8, padding:"6px 12px", fontSize:12, fontWeight:700, display:"flex", alignItems:"center", gap:4 }}>{I.plus} Meal</button>
              </div>
              {state.meals.map(meal => {
                const cal = meal.foods.reduce((s,fid)=>{const f=state.foods.find(x=>x.id===fid);return s+(f?f.calories:0);},0);
                return (
                  <div key={meal.id} className="card">
                    <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between" }}>
                      <div>
                        <div style={{ fontWeight:700, fontSize:14 }}>{meal.name} <span style={{ color:"#448aff", fontFamily:"'Space Mono',monospace", fontSize:12 }}>{cal} kcal</span></div>
                        <div style={{ fontSize:11, color:"#666", marginTop:2 }}>{meal.foods.map(fid=>state.foods.find(f=>f.id===fid)?.name).filter(Boolean).join(" · ")}</div>
                      </div>
                      <div style={{ display:"flex", gap:6 }}>
                        <button className="btn" onClick={()=>setModal({type:"editMeal",meal})} style={{ background:"#1e1e28", color:"#aaa", borderRadius:6, padding:6, display:"flex" }}>{I.edit}</button>
                        <button className="btn" onClick={()=>update(s=>({...s,meals:s.meals.filter(x=>x.id!==meal.id)}))} style={{ background:"#1e1e28", color:"#f44", borderRadius:6, padding:6, display:"flex" }}>{I.trash}</button>
                      </div>
                    </div>
                  </div>
                );
              })}

              <div className="card" style={{ marginTop:16 }}>
                <div style={{ fontSize:14, fontWeight:700, marginBottom:10, display:"flex", alignItems:"center", gap:6 }}>{I.target} Daily Targets</div>
                <div style={{ display:"flex", gap:16 }}>
                  <div style={{ flex:1 }}><label style={{ fontSize:11, color:"#666", fontWeight:600 }}>Calories</label><input type="number" value={state.calorieTarget} onChange={e=>update(s=>({...s,calorieTarget:Number(e.target.value)||0}))}/></div>
                  <div style={{ flex:1 }}><label style={{ fontSize:11, color:"#666", fontWeight:600 }}>Protein (g)</label><input type="number" value={state.proteinTarget} onChange={e=>update(s=>({...s,proteinTarget:Number(e.target.value)||0}))}/></div>
                </div>
              </div>
            </>)}

            {/* ── PROGRESS ── */}
            {tab === "progress" && (<>

              {/* ── BODYWEIGHT TRACKER ── */}
              <div className="card">
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:10 }}>
                  <div style={{ fontSize:14, fontWeight:700 }}>⚖️ Bodyweight</div>
                  <div style={{ display:"flex", gap:6, alignItems:"center" }}>
                    <input type="number" step="0.1" placeholder="kg" id="bw-input" style={{ width:70, fontSize:13, padding:"6px 8px" }}/>
                    <button className="btn" onClick={()=>{ const el=document.getElementById("bw-input"); const v=parseFloat(el.value); if(!v) return; update(s=>({...s, bodyweight:[...s.bodyweight, {date:selectedDate, kg:v}].sort((a,b)=>a.date.localeCompare(b.date))})); el.value=""; }} style={{ background:"#00e676", color:"#000", borderRadius:8, padding:"6px 10px", fontSize:12, fontWeight:700 }}>Log</button>
                  </div>
                </div>
                {state.bodyweight.length > 0 ? (() => {
                  const bw = state.bodyweight.slice(-14);
                  const latest = bw[bw.length-1];
                  const first = bw[0];
                  const diff = (latest.kg - first.kg).toFixed(1);
                  const avg = (bw.reduce((s,x)=>s+x.kg,0)/bw.length).toFixed(1);
                  const maxH = Math.max(...bw.map(x=>x.kg));
                  const minH = Math.min(...bw.map(x=>x.kg));
                  const range = maxH - minH || 1;
                  return (<>
                    <div style={{ display:"flex", gap:12, marginBottom:10 }}>
                      <div style={{ flex:1, textAlign:"center", background:"#1a1a24", borderRadius:8, padding:8 }}>
                        <div style={{ fontFamily:"'Space Mono',monospace", fontWeight:700, fontSize:18, color:"#00e676" }}>{latest.kg}</div>
                        <div style={{ fontSize:10, color:"#555" }}>CURRENT kg</div>
                      </div>
                      <div style={{ flex:1, textAlign:"center", background:"#1a1a24", borderRadius:8, padding:8 }}>
                        <div style={{ fontFamily:"'Space Mono',monospace", fontWeight:700, fontSize:18, color:parseFloat(diff)>0?"#ff9800":"#448aff" }}>{diff>0?"+":""}{diff}</div>
                        <div style={{ fontSize:10, color:"#555" }}>TREND kg</div>
                      </div>
                      <div style={{ flex:1, textAlign:"center", background:"#1a1a24", borderRadius:8, padding:8 }}>
                        <div style={{ fontFamily:"'Space Mono',monospace", fontWeight:700, fontSize:18, color:"#e040fb" }}>{avg}</div>
                        <div style={{ fontSize:10, color:"#555" }}>AVG kg</div>
                      </div>
                    </div>
                    <div style={{ display:"flex", alignItems:"flex-end", gap:3, height:80 }}>
                      {bw.map((w,i) => {
                        const h = Math.max(8, ((w.kg - minH) / range) * 70 + 10);
                        return (
                          <div key={i} style={{ flex:1, display:"flex", flexDirection:"column", alignItems:"center", gap:2 }}>
                            <div style={{ fontSize:8, color:"#555", fontFamily:"'Space Mono',monospace" }}>{w.kg}</div>
                            <div style={{ width:"100%", height:h, background:"linear-gradient(180deg, #00e676, #00e67644)", borderRadius:3 }}/>
                            <div style={{ fontSize:7, color:"#444" }}>{w.date.slice(5)}</div>
                          </div>
                        );
                      })}
                    </div>
                  </>);
                })() : <div style={{ color:"#555", fontSize:12, textAlign:"center", padding:10 }}>Log your first weigh-in above</div>}
              </div>

              {/* ── COACHING INSIGHTS ── */}
              <div className="card" style={{ borderLeft:"3px solid #e040fb" }}>
                <div style={{ fontSize:14, fontWeight:700, marginBottom:10, color:"#e040fb" }}>🧠 Coach Insights</div>
                {(() => {
                  const insights = [];
                  const logDates = Object.keys(state.dailyLog).sort();
                  const last7 = logDates.slice(-7);
                  const last14 = logDates.slice(-14);

                  // 0. Deload week guidance
                  if (state.deloadWeek) {
                    insights.push({ icon:"🔄", text:"DELOAD WEEK — Reduce sets to 2 per exercise, cut reps by 30-40%. Keep weight the same. This is strategic recovery, not laziness. Your muscles grow during rest.", color:"#ff9800" });
                    const lastDeload = state.deloadHistory.length > 1 ? state.deloadHistory[state.deloadHistory.length - 2] : null;
                    if (lastDeload?.end) {
                      const daysSince = Math.floor((new Date(getToday()) - new Date(lastDeload.end)) / 86400000);
                      insights.push({ icon:"📅", text:"Last deload ended " + daysSince + " days ago. Optimal deload frequency for naturals: every 4-6 weeks.", color:"#448aff" });
                    }
                  } else {
                    // Check if deload is overdue
                    const lastDeload = state.deloadHistory.length > 0 ? state.deloadHistory[state.deloadHistory.length - 1] : null;
                    if (lastDeload?.end) {
                      const daysSince = Math.floor((new Date(getToday()) - new Date(lastDeload.end)) / 86400000);
                      if (daysSince > 42) insights.push({ icon:"⚠️", text:"It's been " + daysSince + " days since your last deload. Natural lifters should deload every 4-6 weeks to prevent CNS fatigue & joint stress. Consider activating deload this week.", color:"#f44336" });
                      else if (daysSince > 28) insights.push({ icon:"🔄", text: daysSince + " days since last deload. You're approaching the 4-6 week mark — monitor fatigue, joint soreness & sleep quality.", color:"#ff9800" });
                    } else if (state.deloadHistory.length === 0 && logDates.length > 28) {
                      insights.push({ icon:"🔄", text:"No deload weeks recorded yet. If you've been training hard for 4+ weeks, consider scheduling one. Deloads prevent overtraining and prime your body for new PRs.", color:"#ff9800" });
                    }
                  }

                  // 1. Training consistency
                  const trainedDays = last7.filter(d => { const l=state.dailyLog[d]; return Object.values(l?.checkedWorkouts||{}).some(Boolean); }).length;
                  if (trainedDays >= 5) insights.push({ icon:"✅", text:"Excellent consistency — " + trainedDays + "/7 training days this week. Stay the course.", color:"#00e676" });
                  else if (trainedDays >= 3) insights.push({ icon:"⚡", text: trainedDays + "/7 days trained. Aim for 5 sessions/week for optimal natural hypertrophy.", color:"#ff9800" });
                  else if (trainedDays > 0) insights.push({ icon:"⚠️", text:"Only " + trainedDays + " training days this week. Muscle protein synthesis peaks every 48-72hrs — you're leaving gains on the table.", color:"#f44336" });

                  // 2. Calorie compliance
                  const calDays = last7.map(d => {
                    const log = state.dailyLog[d];
                    return state.meals.reduce((sum, meal) => {
                      if (!log?.checkedMeals?.[meal.id]) return sum;
                      return sum + meal.foods.reduce((fs, fid) => { const f = state.foods.find(x=>x.id===fid); return fs+(f?f.calories:0); }, 0);
                    }, 0);
                  }).filter(c => c > 0);
                  if (calDays.length > 0) {
                    const avgCal = Math.round(calDays.reduce((s,c)=>s+c,0)/calDays.length);
                    const diff = avgCal - state.calorieTarget;
                    if (Math.abs(diff) < 150) insights.push({ icon:"🎯", text:"Calorie intake averaging " + avgCal + " kcal — right on target. Surplus/deficit within optimal range.", color:"#00e676" });
                    else if (diff > 300) insights.push({ icon:"📈", text:"Averaging " + avgCal + " kcal (+" + diff + " over target). If not bulking, reduce by ~" + Math.abs(diff) + " kcal to stay lean.", color:"#ff9800" });
                    else if (diff < -300) insights.push({ icon:"📉", text:"Averaging " + avgCal + " kcal (" + diff + " under target). Under-eating impairs recovery. Prioritise hitting " + state.calorieTarget + " kcal.", color:"#f44336" });
                    const loggedDays = calDays.length;
                    if (loggedDays < 5 && last7.length >= 5) insights.push({ icon:"📝", text:"Only logged meals on " + loggedDays + "/7 days. Consistent tracking = consistent results. Log everything.", color:"#ff9800" });
                  }

                  // 3. Protein check
                  const protDays = last7.map(d => {
                    const log = state.dailyLog[d];
                    return state.meals.reduce((sum, meal) => {
                      if (!log?.checkedMeals?.[meal.id]) return sum;
                      return sum + meal.foods.reduce((fs, fid) => { const f = state.foods.find(x=>x.id===fid); return fs+(f?f.protein:0); }, 0);
                    }, 0);
                  }).filter(p => p > 0);
                  if (protDays.length > 0) {
                    const avgProt = Math.round(protDays.reduce((s,p)=>s+p,0)/protDays.length);
                    if (avgProt >= state.proteinTarget * 0.9) insights.push({ icon:"💪", text:"Protein at ~" + avgProt + "g/day. Excellent for natural muscle protein synthesis.", color:"#00e676" });
                    else insights.push({ icon:"🥩", text:"Protein only ~" + avgProt + "g/day (target: " + state.proteinTarget + "g). For natty lifters, 1.6-2.2g/kg is critical. Add another whey shake or meal.", color:"#f44336" });
                  }

                  // 4. Bodyweight trend
                  if (state.bodyweight.length >= 3) {
                    const recent = state.bodyweight.slice(-7);
                    const weekAgo = state.bodyweight.slice(-14, -7);
                    if (weekAgo.length > 0) {
                      const recentAvg = recent.reduce((s,x)=>s+x.kg,0)/recent.length;
                      const prevAvg = weekAgo.reduce((s,x)=>s+x.kg,0)/weekAgo.length;
                      const wkDiff = (recentAvg - prevAvg).toFixed(1);
                      if (Math.abs(wkDiff) < 0.2) insights.push({ icon:"⚖️", text:"Weight stable at ~" + recentAvg.toFixed(1) + "kg. If bulking, increase cals by 100-200. If maintaining, perfect.", color:"#448aff" });
                      else if (wkDiff > 0.5) insights.push({ icon:"⚖️", text:"Up ~" + wkDiff + "kg this week. If gaining >0.5kg/week as a natty, some is likely fat. Dial back ~200 kcal.", color:"#ff9800" });
                      else if (wkDiff < -0.5) insights.push({ icon:"⚖️", text:"Down ~" + Math.abs(wkDiff) + "kg this week. If cutting, good pace. If maintaining/bulking, eat more — you're losing muscle.", color:"#f44336" });
                    }
                  }

                  // 5. Volume per muscle group frequency
                  const muscleFreq = {};
                  last7.forEach(d => {
                    const log = state.dailyLog[d];
                    if (!log) return;
                    state.workouts.forEach(w => {
                      if (!log.checkedWorkouts?.[w.id]) return;
                      w.exercises.forEach(eid => {
                        const ex = state.exercises.find(e=>e.id===eid);
                        if (ex) muscleFreq[ex.muscle] = (muscleFreq[ex.muscle]||0) + 1;
                      });
                    });
                  });
                  const underTrained = ["Legs","Chest","Back","Shoulders","Arms"].filter(m => (muscleFreq[m]||0) < 2);
                  if (underTrained.length > 0 && trainedDays >= 3) insights.push({ icon:"🔍", text: underTrained.join(", ") + " hit fewer than 2x this week. For hypertrophy, each muscle needs 2+ sessions/week with 10-20 sets.", color:"#ff9800" });

                  // 6. Set completion rate
                  const totalPossible = last7.reduce((s,d) => {
                    const log = state.dailyLog[d];
                    return s + state.workouts.reduce((ws,w) => {
                      if (!log?.checkedWorkouts?.[w.id]) return ws;
                      return ws + w.exercises.length * 3;
                    }, 0);
                  }, 0);
                  const totalDone = last7.reduce((s,d) => s + Object.values(state.dailyLog[d]?.checkedSets||{}).filter(Boolean).length, 0);
                  if (totalPossible > 0) {
                    const pct = Math.round(totalDone/totalPossible*100);
                    if (pct >= 90) insights.push({ icon:"🔥", text: pct + "% set completion rate. Elite work ethic. Make sure you're pushing RPE 7-9 on working sets.", color:"#00e676" });
                    else if (pct >= 60) insights.push({ icon:"📊", text: pct + "% sets completed. Aim for >90%. Skipped sets = missed volume = slower progress.", color:"#ff9800" });
                  }

                  // 7. Stagnation detection
                  const staleExercises = state.exercises.filter(ex => ex.topWeight > 0 && ex.topReps > 0).slice(0, 20);
                  if (staleExercises.length > 10 && logDates.length > 14) {
                    insights.push({ icon:"🔄", text:"Review your PRs below. If key lifts haven't moved in 2+ weeks, consider: changing rep ranges, adding pauses, or swapping exercise variations.", color:"#448aff" });
                  }

                  if (insights.length === 0) insights.push({ icon:"👋", text:"Start logging workouts and meals to unlock personalised coaching insights.", color:"#555" });

                  return insights.map((ins, i) => (
                    <div key={i} style={{ display:"flex", gap:8, padding:"8px 0", borderBottom: i < insights.length-1 ? "1px solid #1a1a24" : "none" }}>
                      <div style={{ fontSize:16, flexShrink:0 }}>{ins.icon}</div>
                      <div style={{ fontSize:12, color:ins.color, lineHeight:1.5 }}>{ins.text}</div>
                    </div>
                  ));
                })()}
              </div>

              {/* ── WEEKLY OVERVIEW ── */}
              <div className="card">
                <div style={{ fontSize:14, fontWeight:700, marginBottom:12 }}>📊 Last 14 Days — Calories</div>
                {calHistory.length===0 ? <div style={{ color:"#555", fontSize:13, padding:20, textAlign:"center" }}>No data yet.</div> : (
                  <div style={{ display:"flex", alignItems:"flex-end", gap:4, height:120 }}>
                    {calHistory.map(d => {
                      const h = Math.max(4, (d.calories/(state.calorieTarget||2500))*100);
                      return (
                        <div key={d.date} style={{ flex:1, display:"flex", flexDirection:"column", alignItems:"center", gap:2 }}>
                          <div style={{ fontSize:9, color:"#555", fontFamily:"'Space Mono',monospace" }}>{d.calories>0?d.calories:""}</div>
                          <div style={{ width:"100%", height:h, background:d.calories>state.calorieTarget?"#f44336":"#00e676", borderRadius:4, minHeight:4, opacity:d.calories>0?1:.2 }}/>
                          <div style={{ fontSize:8, color:"#444" }}>{d.date.slice(5)}</div>
                        </div>
                      );
                    })}
                  </div>
                )}
              </div>

              <div className="card">
                <div style={{ fontSize:14, fontWeight:700, marginBottom:12 }}>🏋️ Last 14 Days — Sets Completed</div>
                {calHistory.length===0 ? <div style={{ color:"#555", fontSize:13, padding:20, textAlign:"center" }}>No data yet.</div> : (
                  <div style={{ display:"flex", alignItems:"flex-end", gap:4, height:120 }}>
                    {calHistory.map(d => {
                      const h = Math.max(4, (d.sets/(totalSets||1))*100);
                      return (
                        <div key={d.date} style={{ flex:1, display:"flex", flexDirection:"column", alignItems:"center", gap:2 }}>
                          <div style={{ fontSize:9, color:"#555", fontFamily:"'Space Mono',monospace" }}>{d.sets>0?d.sets:""}</div>
                          <div style={{ width:"100%", height:h, background:"#ff9800", borderRadius:4, minHeight:4, opacity:d.sets>0?1:.2 }}/>
                          <div style={{ fontSize:8, color:"#444" }}>{d.date.slice(5)}</div>
                        </div>
                      );
                    })}
                  </div>
                )}
              </div>

              {/* ── MUSCLE VOLUME THIS WEEK ── */}
              {(() => {
                const muscleColors = { "Legs":"#00e676", "Chest":"#f44336", "Back":"#448aff", "Shoulders":"#ff9800", "Arms":"#e040fb", "Core":"#00bcd4", "Cardio":"#ffeb3b", "Full Body":"#8bc34a" };
                const logDates = Object.keys(state.dailyLog).sort().slice(-7);
                const volMap = {};
                logDates.forEach(d => {
                  const log = state.dailyLog[d];
                  if (!log) return;
                  state.workouts.forEach(w => {
                    if (!log.checkedWorkouts?.[w.id]) return;
                    w.exercises.forEach(eid => {
                      const ex = state.exercises.find(e=>e.id===eid);
                      if (ex) {
                        const sets = [0,1,2].filter(si => log.checkedSets?.[`${w.id}-${eid}-${si}`]).length;
                        volMap[ex.muscle] = (volMap[ex.muscle]||0) + sets;
                      }
                    });
                  });
                });
                const muscles = Object.keys(volMap).sort((a,b) => volMap[b]-volMap[a]);
                if (muscles.length === 0) return null;
                const maxVol = Math.max(...Object.values(volMap));
                return (
                  <div className="card">
                    <div style={{ fontSize:14, fontWeight:700, marginBottom:12 }}>💎 Weekly Volume (sets per muscle)</div>
                    {muscles.map(m => (
                      <div key={m} style={{ marginBottom:8 }}>
                        <div style={{ display:"flex", justifyContent:"space-between", marginBottom:3 }}>
                          <div style={{ fontSize:12, fontWeight:600, color:muscleColors[m]||"#ccc" }}>{m}</div>
                          <div style={{ fontSize:12, fontFamily:"'Space Mono',monospace", color:volMap[m]>=10?"#00e676":volMap[m]>=6?"#ff9800":"#f44336" }}>{volMap[m]} sets {volMap[m]<10?"⬆️ need more":volMap[m]<=20?"✓ optimal":"⚠️ high"}</div>
                        </div>
                        <div style={{ height:6, background:"#1a1a24", borderRadius:3, overflow:"hidden" }}>
                          <div style={{ height:"100%", width:`${Math.min(100,(volMap[m]/20)*100)}%`, background:muscleColors[m]||"#00e676", borderRadius:3, transition:"width .3s ease" }}/>
                        </div>
                      </div>
                    ))}
                    <div style={{ fontSize:10, color:"#444", marginTop:6 }}>Target: 10-20 sets/muscle/week for natural hypertrophy</div>
                  </div>
                );
              })()}

              {/* ── DELOAD HISTORY ── */}
              {state.deloadHistory.length > 0 && (
                <div className="card">
                  <div style={{ fontSize:14, fontWeight:700, marginBottom:10 }}>🔄 Deload History</div>
                  {state.deloadHistory.slice().reverse().map((d, i) => (
                    <div key={i} style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"6px 0", borderBottom: i < state.deloadHistory.length - 1 ? "1px solid #1a1a24" : "none" }}>
                      <div style={{ fontSize:12, color:"#ccc" }}>
                        {d.start}{d.end ? " → " + d.end : " → ongoing"}
                      </div>
                      <div style={{ fontSize:11, fontFamily:"'Space Mono',monospace", color: d.end ? "#00e676" : "#ff9800" }}>
                        {d.end ? Math.floor((new Date(d.end) - new Date(d.start)) / 86400000) + " days" : "active"}
                      </div>
                    </div>
                  ))}
                </div>
              )}

              {/* ── PR CATEGORIES BY MUSCLE GROUP ── */}
              <div style={{ fontSize:14, fontWeight:700, marginBottom:8, marginTop:4 }}>🏆 Personal Records by Muscle</div>
              {(() => {
                const muscleColors = { "Legs": "#00e676", "Chest": "#f44336", "Back": "#448aff", "Shoulders": "#ff9800", "Arms": "#e040fb", "Core": "#00bcd4", "Cardio": "#ffeb3b", "Full Body": "#8bc34a" };
                const muscleOrder = ["Legs", "Chest", "Back", "Shoulders", "Arms", "Core", "Cardio", "Full Body"];
                const grouped = {};
                state.exercises.forEach(ex => {
                  if (!grouped[ex.muscle]) grouped[ex.muscle] = [];
                  grouped[ex.muscle].push(ex);
                });
                return muscleOrder.filter(m => grouped[m] && grouped[m].length > 0).map(muscle => (
                  <PRCategory key={muscle} muscle={muscle} exercises={grouped[muscle]} color={muscleColors[muscle] || "#00e676"} />
                ));
              })()}
            </>)}
          </div>

          {/* TAB BAR */}
          <div className="tab-bar">
            {tabs.map(t => (
              <div key={t.key} className={`tab-item ${tab===t.key?"active":""}`} onClick={()=>setTab(t.key)}>
                {t.icon}<span>{t.label}</span>
              </div>
            ))}
          </div>

          {/* MODALS */}
          {modal && (
            <div className="modal-overlay" onClick={()=>setModal(null)}>
              <div className="modal-content" onClick={e=>e.stopPropagation()}>
                {modal.type==="addEx" && <AddExModal update={update} close={()=>setModal(null)}/>}
                {modal.type==="editEx" && <EditExModal update={update} exercise={modal.exercise} close={()=>setModal(null)}/>}
                {modal.type==="addFood" && <AddFoodModal update={update} close={()=>setModal(null)}/>}
                {modal.type==="editFood" && <EditFoodModal update={update} food={modal.food} close={()=>setModal(null)}/>}
                {modal.type==="addW" && <AddWModal state={state} update={update} close={()=>setModal(null)}/>}
                {modal.type==="editW" && <EditWModal state={state} update={update} workout={modal.workout} close={()=>setModal(null)}/>}
                {modal.type==="addMeal" && <AddMModal state={state} update={update} close={()=>setModal(null)}/>}
                {modal.type==="editMeal" && <EditMModal state={state} update={update} meal={modal.meal} close={()=>setModal(null)}/>}
              </div>
            </div>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>

  <script>
    // Register service worker for PWA
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').then(r => {
          console.log('SW registered:', r.scope);
        }).catch(e => console.log('SW failed:', e));
      });
    }
  </script>
</body>
</html>
